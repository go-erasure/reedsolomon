name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CGO_ENABLED: "0"
  GOWORK: "off"

jobs:
  # Native amd64 (SSSE3 split-table kernel) and native arm64 (NEON split-table
  # kernel). The differential fuzz oracle (galois_simd_test.go) proves each SIMD
  # galMul/galMulAdd bit-identical to the scalar loop, and the gate enforces 100%
  # Go-statement coverage on each — this is where galois_amd64.s / galois_arm64.s
  # are compiled, executed, and covered.
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -v ./...
      - name: Differential fuzz
        run: go test -run '^$' -fuzz FuzzGalMul -fuzztime 20s .
      - name: Test with coverage
        run: go test -covermode=set -coverprofile=cover.out ./...
      - name: Enforce 100% coverage
        run: |
          pct=$(go tool cover -func=cover.out | awk '/^total:/{print $3}' | tr -d '%')
          echo "total coverage (${{ matrix.arch }}): ${pct}%"
          awk -v p="$pct" 'BEGIN{exit (p+0<100.0)?1:0}'

  # The riscv64 RVV (vrgather.vv), loong64 LSX (vshuf.b), ppc64le VSX (VPERM) and
  # s390x vector (VPERM) split-table kernels, each run under QEMU user emulation
  # with the SIMD feature enabled. The differential oracle proves each bit-identical
  # to the scalar loop and the gate enforces 100% coverage, so galois_<arch>.s is
  # compiled, executed and covered here. The riscv64 lane pins VLEN=256 (VLMAX=32 at
  # SEW8). QEMU_CPU models match the GREEN go-erasure/mojette emulated lanes.
  emulated:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: riscv64, image: "debian:trixie",                 qemu: "rv64,v=true,vlen=256" }
          - { arch: loong64, image: "ghcr.io/loong64/debian:trixie", qemu: "la464" }
          - { arch: ppc64le, image: "debian:trixie",                 qemu: "power9" }
          - { arch: s390x,   image: "debian:trixie",                 qemu: "qemu" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - run: docker run --privileged --rm tonistiigi/binfmt --install all
      - name: build ${{ matrix.arch }} cover binary
        run: GOOS=linux GOARCH=${{ matrix.arch }} go test -c -cover -o /tmp/t.test .
      - name: run under QEMU and gate (100%)
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} \
            -e QEMU_CPU=${{ matrix.qemu }} \
            -v /tmp:/t ${{ matrix.image }} \
            /t/t.test -test.v -test.coverprofile=/t/cov.out
          go tool cover -func=/tmp/cov.out
          pct=$(go tool cover -func=/tmp/cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }

  # POWER8 ISA-guard lane. The emulated ppc64le job runs the POWER9 model; this lane
  # runs the SAME binary under QEMU_CPU=power8 so an ISA-3.0 op illegal on POWER8
  # would SIGILL here. The VSX split-table kernel uses only POWER8-baseline
  # LXVD2X/STXVD2X/VPERM/VAND/VSRB/VXOR/VSPLTISB, so it must not SIGILL. No coverage
  # gate (contract is "must not SIGILL on POWER8"; 100% is enforced by the POWER9
  # lane).
  emulated-ppc64le-power8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - run: docker run --privileged --rm tonistiigi/binfmt --install all
      - run: GOOS=linux GOARCH=ppc64le go test -c -cover -o /tmp/t.test .
      - name: run ppc64le binary on POWER8 (must not SIGILL)
        run: docker run --rm --platform linux/ppc64le -e QEMU_CPU=power8 -v /tmp:/t debian:trixie /t/t.test -test.v

  cross-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux/amd64
          - linux/arm64
          - linux/riscv64
          - linux/ppc64le
          - linux/s390x
          - linux/loong64
          - darwin/amd64
          - darwin/arm64
          - windows/amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - name: Build ${{ matrix.target }}
        run: |
          export GOOS=${{ matrix.target }}
          export GOARCH=${GOOS#*/}
          export GOOS=${GOOS%/*}
          go build ./...
